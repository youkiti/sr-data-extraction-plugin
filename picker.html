<!doctype html>
<!--
  Drive Picker ホストページ（lib/google/picker.ts の対向実装）。
  version: 2026-07-19a (issue #141: buildPicker 集約 + page_version ハンドシェイク +
           files モードの file_ids を ready 応答経由に変更)

  MV3 では apis.google.com のスクリプトを拡張ページで読み込めないため、
  このページを HTTPS でホストし（既定: GitHub Pages。lib/google/picker.ts の
  PICKER_PAGE_URL と manifest.json の externally_connectable.matches に合わせる）、
  拡張が新規タブで開く。プロトコルは picker.ts 冒頭のコメントを正典とする。

  フラグメントパラメータ:
  - extension_id : 必須。sendMessage の宛先
  - nonce        : 拡張が起動ごとに生成。受け取ったら全メッセージへ echo する
                   （旧拡張は付けてこないため、無いときは echo しない = 後方互換）
  - view         : 'spreadsheet' でスプレッドシート選択モード（issue #130 の共有シート許可導線）。
                   'files' でプロジェクトファイル許可モード（issue #139 の reviewer オンボーディング。
                   共有フォルダの Picker 選択では drive.file の読み取りが配下ファイルへ付与されない
                   ことが実機で確定したため、必要ファイルを列挙して全選択で 1 件ずつ付与する）。
                   無指定は従来の PDF / フォルダ取り込みモード
  - file_id      : view=spreadsheet のとき、対象シートだけを表示する（setFileIds）。
                   setFileIds は表示フィルタであり、Drive 側で共有されていないシートは
                   表示されない点に注意（ページ内の注意書きで案内）
  - file_ids     : view=files のとき、表示対象のファイル ID（カンマ区切り）。新拡張は ready 応答
                   （sendMessage のコールバックで受け取る response.file_ids）で渡すため、この
                   フラグメントは付けてこない（issue #141: 数百件規模での URL 実用上限回避 +
                   ブラウザ履歴に ID 一覧を残さないため）。旧拡張との後方互換のため、フラグメント
                   で渡された場合（response.file_ids が無いとき）は従来どおりこちらを使う

  page_version ハンドシェイク（issue #141）:
  - このページは ready メッセージへ { page_version: PAGE_VERSION } を含める。新拡張は
    files モードでこの値が 1 未満（未対応の旧ページ）だとトークンを渡さずエラーにする
    （旧ページのままだと file_ids を ready 応答経由で受け取れないため。ページ先行デプロイの
    原則により、拡張リリース前に本ページを再デプロイすること）

  デプロイ時の設定（このファイル内のプレースホルダを書き換える）:
  - PICKER_API_KEY : GCP の API キー（Google Picker API を有効化したプロジェクトのもの）
  - PICKER_APP_ID  : GCP のプロジェクト番号（drive.file スコープの選択ファイルを拡張へ許可するのに必須）
-->
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SR データ抽出 — Drive Picker</title>
    <style>
      body {
        font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", sans-serif;
        margin: 40px;
        color: #1f2a26;
      }
      .error { color: #b3261e; }
      .muted { color: #5c6b64; font-size: 0.9em; }
    </style>
  </head>
  <body>
    <h1 id="title">Drive から PDF / フォルダを選択</h1>
    <p id="status">読み込み中…</p>
    <p id="sheet-note" class="muted" hidden>
      目的のシートが表示されない場合は、シートがあなたの Google アカウントに共有されているかを
      Drive で確認してください。
      <a href="#" id="show-all">すべてのスプレッドシートから選ぶ</a>
    </p>
    <p id="files-note" class="muted" hidden>
      一覧の先頭を選択 → 末尾を Shift+クリックすると全件を範囲選択できます。選択したファイルだけが
      拡張から読めるようになります。ファイルが表示されない場合は、プロジェクトフォルダがあなたの
      Google アカウントに共有されているかを Drive で確認してください。
    </p>
    <script>
      // デプロイ時に実値へ書き換える（API キーはブラウザキー = 公開前提の値）
      var PICKER_API_KEY = 'AIzaSyBZHP3AaHT3_pieKMXQlk4ss5aXQKE2euU';
      var PICKER_APP_ID = '1022221973986';

      var MESSAGE_SOURCE = 'sr-data-extraction-picker';
      // ページ側のプロトコル対応バージョン（issue #141）。拡張は files モードで
      // この値を検査し、未対応（無い/古い）なら明示エラーにする
      var PAGE_VERSION = 1;
      var statusEl = document.getElementById('status');
      var titleEl = document.getElementById('title');
      var sheetNoteEl = document.getElementById('sheet-note');
      var filesNoteEl = document.getElementById('files-note');
      var showAllEl = document.getElementById('show-all');

      function fail(message) {
        statusEl.textContent = message;
        statusEl.className = 'error';
      }

      // 拡張 ID・モード・nonce はフラグメントで受け取る
      // （トークンは URL に載せず ready 応答で受け取る）
      var params = new URLSearchParams(location.hash.slice(1));
      var extensionId = params.get('extension_id');
      var viewMode = params.get('view');
      var targetFileId = params.get('file_id');
      var targetFileIds = params.get('file_ids');
      var nonce = params.get('nonce');

      function send(message, callback) {
        // nonce を受け取っている場合は全メッセージへ echo する（拡張側が照合する）
        if (nonce) {
          message.nonce = nonce;
        }
        chrome.runtime.sendMessage(extensionId, message, callback);
      }

      function onPickerAction() {
        return function (data) {
          var action = data[google.picker.Response.ACTION];
          if (action === google.picker.Action.PICKED) {
            var files = data[google.picker.Response.DOCUMENTS].map(function (doc) {
              // mimeType はフォルダ（application/vnd.google-apps.folder）判定に使う。
              // 拡張はフォルダなら直下 PDF を列挙して取り込む（lib/google/picker.ts / documentsService）
              return {
                id: doc[google.picker.Document.ID],
                name: doc[google.picker.Document.NAME],
                mimeType: doc[google.picker.Document.MIME_TYPE],
              };
            });
            send({ source: MESSAGE_SOURCE, kind: 'picked', files: files });
            statusEl.textContent = '選択を拡張へ送信しました。このタブは自動的に閉じます。';
          } else if (action === google.picker.Action.CANCEL) {
            send({ source: MESSAGE_SOURCE, kind: 'cancelled' });
          }
        };
      }

      // 3 モード共通の PickerBuilder ボイラープレート（issue #141）。
      // views は addView へ渡す順番のまま並べた配列（ViewId 文字列 / View インスタンス混在可）。
      // opts.token は必須、opts.multiselect が true のときだけ MULTISELECT_ENABLED を有効化する。
      // 各モード関数はビュー構築とこの呼び出しだけを行い、挙動（ビューの種類・順序・ラベル・
      // タイトル・案内文・フェイルクローズ）はリファクタ前と完全に同一にする
      function buildPicker(views, title, opts) {
        var builder = new google.picker.PickerBuilder();
        if (opts.multiselect) {
          builder.enableFeature(google.picker.Feature.MULTISELECT_ENABLED);
        }
        builder.setDeveloperKey(PICKER_API_KEY).setAppId(PICKER_APP_ID).setOAuthToken(opts.token);
        views.forEach(function (view) {
          builder.addView(view);
        });
        builder.setTitle(title).setCallback(onPickerAction()).build().setVisible(true);
      }

      function showPdfPicker(token) {
        // ビューは addView した分だけ左側のタブになる（先頭が既定タブ）。
        // 既定タブ = 最近使用したファイル、
        // 補助タブ = マイドライブ（PDF フィルタ + フォルダ階層 + フォルダ選択可）/ スター付き（PDF フィルタ）
        // setSelectFolderEnabled(true): フォルダそのものを選択可にする。フォルダを選ぶと拡張が
        // その直下 PDF を列挙して一括取り込みする（drive.file スコープでも選択フォルダ配下は列挙可）。
        var driveView = new google.picker.DocsView(google.picker.ViewId.DOCS)
          .setMimeTypes('application/pdf')
          .setIncludeFolders(true)
          .setSelectFolderEnabled(true);
        // スター付きは ViewId.PDFS を使う。DocsView() を引数なしで作ると ViewId が
        // 既定の DOCS になり driveView と衝突し、Picker のタブ選択インジケータ（青線）が
        // 同一 ViewId の最後の addView（＝スター付き）へ張り付いたまま追従しなくなる。
        var starredView = new google.picker.DocsView(google.picker.ViewId.PDFS)
          .setStarred(true)
          .setMimeTypes('application/pdf');
        // ラベル未指定だと DocsView 既定の「Google ドライブ」表示になり
        // マイドライブと見分けがつかないため明示する（setLabel は非公開 API のためガード）
        if (typeof starredView.setLabel === 'function') {
          starredView.setLabel('スター付き');
        }
        buildPicker(
          [google.picker.ViewId.RECENTLY_PICKED, driveView, starredView],
          '取り込む PDF またはフォルダを選択',
          { token: token, multiselect: true },
        );
        statusEl.textContent = 'PDF またはフォルダを選択してください。';
      }

      // プロジェクトファイル許可モード（issue #139）。拡張が Documents タブ由来の必要ファイル ID
      // （PDF + 抽出テキスト）を渡してくるので、setFileIds で列挙して全選択してもらう。
      // mime フィルタは掛けない（PDF 以外の抽出テキストも選択対象のため）。
      // ID 一覧で絞り込めない状況では「全 Drive 表示 + 全選択の案内」という危険な縮退になるため、
      // fileIds 欠落・setFileIds 非対応はフェイルクローズにする
      function showProjectFilesPicker(token, fileIds) {
        var view = new google.picker.DocsView(google.picker.ViewId.DOCS);
        if (typeof view.setFileIds !== 'function') {
          fail('この環境の Picker はファイル指定（setFileIds）に対応していません。拡張のタブから開き直してください。');
          return;
        }
        view.setFileIds(fileIds);
        buildPicker(
          [view],
          // Picker はモーダルでページ本文（#status / #files-note）を覆い隠すため、
          // 全選択の操作説明はモーダル上に常時見えるタイトルへ入れる（Picker 内部は
          // Google 配信の iframe で、ページ側から選択操作を代行するボタンは作れない）
          'すべて選択してください: 先頭を 1 クリック → 末尾を Shift+クリック',
          { token: token, multiselect: true },
        );
        statusEl.textContent =
          '表示されたファイルをすべて選択してください（先頭を 1 クリック → 末尾を Shift+クリックで範囲選択。一部だけ選択すると検証画面で読み込みに失敗します）。';
        filesNoteEl.hidden = false;
      }

      // スプレッドシート許可モード（issue #130）。restrict=true なら対象シートだけを表示する。
      // setFileIds は表示フィルタであり事前フォーカスではない: Drive 側で共有されていない
      // シートはそもそも表示されない（→ 上部の注意書き + 全シートフォールバックで案内）
      function showSpreadsheetPicker(token, restrict) {
        var view = new google.picker.DocsView(google.picker.ViewId.SPREADSHEETS);
        if (restrict && targetFileId && typeof view.setFileIds === 'function') {
          view.setFileIds(targetFileId);
        }
        buildPicker([view], 'プロジェクトのスプレッドシートを選択', { token: token, multiselect: false });
        statusEl.textContent =
          'プロジェクトのスプレッドシートを選択してください（選択すると拡張へアクセスが許可されます）。';
        sheetNoteEl.hidden = false;
      }

      function onApiLoaded() {
        gapi.load('picker', function () {
          // 拡張へ ready（+ page_version）を送り、応答で OAuth トークンを受け取ってから
          // Picker を表示する。page_version は拡張側のバージョンハンドシェイク（issue #141）
          send({ source: MESSAGE_SOURCE, kind: 'ready', page_version: PAGE_VERSION }, function (response) {
            if (chrome.runtime.lastError || !response || !response.token) {
              fail('拡張からトークンを受け取れませんでした。拡張のタブから開き直してください。');
              return;
            }
            if (viewMode === 'spreadsheet') {
              titleEl.textContent = 'プロジェクトのスプレッドシートを選択';
              document.title = 'SR データ抽出 — スプレッドシートの許可';
              showAllEl.addEventListener('click', function (event) {
                event.preventDefault();
                showSpreadsheetPicker(response.token, false);
              });
              showSpreadsheetPicker(response.token, true);
            } else if (viewMode === 'files') {
              titleEl.textContent = 'プロジェクトのファイルをすべて選択';
              document.title = 'SR データ抽出 — ファイルの許可';
              // file_ids は ready 応答（新拡張）を優先し、無ければフラグメント（旧拡張）を使う
              // （issue #141: 新拡張は file_ids を URL に載せないため）
              var fileIds =
                Array.isArray(response.file_ids) && response.file_ids.length > 0
                  ? response.file_ids.join(',')
                  : targetFileIds;
              if (!fileIds) {
                fail('対象ファイルの一覧を受け取れませんでした。拡張のタブから開き直してください。');
              } else {
                showProjectFilesPicker(response.token, fileIds);
              }
            } else {
              showPdfPicker(response.token);
            }
          });
        });
      }

      if (!extensionId) {
        fail('このページは SR データ抽出拡張から開いてください（extension_id がありません）。');
      } else if (typeof chrome === 'undefined' || !chrome.runtime || !chrome.runtime.sendMessage) {
        fail('このブラウザでは拡張と通信できません（Chrome で開いてください）。');
      } else {
        var script = document.createElement('script');
        script.src = 'https://apis.google.com/js/api.js';
        script.onload = onApiLoaded;
        script.onerror = function () {
          fail('Google Picker API の読み込みに失敗しました。ネットワークを確認してください。');
        };
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
