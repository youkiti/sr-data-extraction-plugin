<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SR Data Extraction Plugin — メインビュー</title>
    <link rel="stylesheet" href="../styles/tokens.css" />
    <link rel="stylesheet" href="../styles/globals.css" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div class="app">
      <header class="app__header">
        <div class="app__brand">
          <h1 class="app__title-heading">
            <button id="app-title" class="app__title" type="button">SR Data Extraction Plugin</button>
          </h1>
          <p id="app-build-date" class="app__build-date"></p>
        </div>
        <p id="app-status" class="app__status">読み込み中…</p>
        <a id="app-open-popup" href="../popup/popup.html" hidden>プロジェクト選択を開く</a>
        <a
          id="app-open-options"
          class="app__options-link"
          href="#/options"
          title="設定を開く"
          aria-label="設定を開く"
          >⚙</a
        >
        <p id="app-context" class="app__context" aria-live="polite">起動中</p>
      </header>
      <div class="app__body">
        <aside class="app__sidebar">
          <nav aria-label="ステップナビゲーション">
            <ul id="app-nav" class="app__nav"></ul>
          </nav>
        </aside>
        <main id="app-content" class="app__content"></main>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
