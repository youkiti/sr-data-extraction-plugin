# CI-1（docs/test-strategy.md §4）: typecheck + jest（カバレッジ 100% 込み）+ lint + lint:css + dev ビルド。
# CI-2 導入済み（2026-07-03）: Playwright E2E を e2e ジョブとして check と並列実行する
name: CI

on:
  push:
    branches: [master]
  pull_request:
  # push トリガーは master のみのため、作業ブランチ上で手動実行して green を確認する用途
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: 依存関係のインストール
        run: npm ci
      - name: 型検査
        run: npm run typecheck
      - name: ESLint
        run: npm run lint
      - name: stylelint
        run: npm run lint:css
      - name: jest（カバレッジ 100% 強制）
        run: npm test
      - name: dev ビルド検証（作業原則 7）
        run: npm run dev

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: 依存関係のインストール
        run: npm ci
      - name: Playwright ブラウザの取得
        run: npx playwright install --with-deps chromium
      # E2E は spec 内で合成する minimal PDF を stub 配信するため、実 PDF fixture の取得（fetch-pdfs.ps1）は不要
      - name: Playwright E2E
        run: npm run test:e2e
